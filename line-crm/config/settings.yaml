# =====================================================
# LINE CRM — 全局设置
# 换服务器只需改这里
# =====================================================

server:
  host: "0.0.0.0"
  port: 8000
  # 如果有域名，填这里
  public_url: ""  # e.g. "https://line-api.yourdomain.com"

# ─── AI 服务 ───
ai:
  # 主力: DeepSeek（已配置）
  deepseek:
    api_key: "sk-e58753dfef16473faa767db926bab578"
    model: "deepseek-chat"
    max_tokens: 80
    timeout: 30

  # 备用: Claude（后续接入，香港VPS直连）
  claude:
    api_key: ""
    model: "claude-sonnet-4-6"
    max_tokens: 150
    timeout: 30

# ─── 数据存储 ───
storage:
  # 当前测试用文件存储，换服务器后切 Redis + PostgreSQL
  mode: file  # file | redis_postgres

  # Redis（切换后生效）
  redis:
    host: "localhost"
    port: 6379
    db: 0

  # PostgreSQL（切换后生效）
  postgres:
    host: "localhost"
    port: 5432
    database: "line_crm"
    user: "lineuser"
    password: ""

# ─── 任务调度 ───
task_scheduler:
  check_interval: 30       # 检查新任务间隔(秒)
  message_check_interval: 15 # 检查新消息间隔(秒)
  max_concurrent_tasks: 5  # 最大并发任务数

# ─── 日志 ───
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
  dir: /root/line-crm/logs
  max_size_mb: 50
  backup_count: 3
