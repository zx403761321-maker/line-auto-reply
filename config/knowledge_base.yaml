# ─── 官方LINE溝通流程 ───
official_line_flow:
  step_1:
    title: "收集基本資料"
    fields:
      - "姓名"
      - "電話"
      - "身份證字號"
      - "戶籍地址"
      - "通訊地址"
      - "公司名稱"
      - "公司電話"
      - "在職時間"
      - "每月收入"
      - "薪轉勞保"
      - "是否為警示戶"
      - "申請金額"
      - "資金用途"
  step_2:
    title: "核實資料"
    description: "提供工作證明收入證明，核實戶籍地址及通訊地址，工作地是否有誤"
  step_3:
    title: "身份驗證"
    description: "提供身分證正反面以及手持身分證自拍5秒影片(證明本次借款為本人申請)，還有兩位聯絡人資訊（麻煩留家人）"
  step_4:
    title: "給方案"
    description: "額度5000/7000/10000，實際撥款3000/4000/6000，期限7天，到期日18:00前還款，遲繳10%罰款，逾期每日15%"
  step_5:
    title: "簽約撥款"
    sub_steps:
      - "5-1 簽約"
      - "5-2 撥款：提供撥款帳戶資訊，財務撥款"
      - "5-3 撥款完成：請查收確認，未收到請附存摺或網銀畫面"
  step_6:
    title: "撥款後通知"
    description: "借款期間收到訊息要回復，禁止無故刪除封鎖，否則撥打聯絡人電話"
  step_7:
    title: "注意聲明"
    description: "還款僅轉帳與超商代碼繳費，勿輕信陌生人見面收現金。轉帳金額一致勿備註。勿輕信陌生人索取自拍照/證件/帳戶。"
